<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="style.css" />
    <title>Woody's To-DO List</title>
    <script
      src="todo.js"
      defer></script>
  </head>
  <body>
    <div class="container">
      <h1 class="container-header">Woody To Do</h1>
      <form
        id="todo-form"
        class="container-form">
        <input
          type="text"
          name="input"
          id="todo-input"
          placeholder="스터디 계획을 작성해보세요" />
      </form>

      <div class="list-container">
        <div class="list-section">
          <h2 class="list-title">해야 할 일</h2>
          <ul
            id="todo"
            class="list"></ul>
        </div>
        <div class="list-section">
          <h2 class="list-title">완료</h2>
          <ul
            id="done"
            class="list"></ul>
        </div>
      </div>
    </div>
  </body>
</html>
